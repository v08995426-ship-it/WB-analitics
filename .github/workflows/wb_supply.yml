name: WB Supply Calculation

on:
  workflow_dispatch:
    inputs:
      store_name:
        description: "Магазин (например TOPFACE или MISS_TAIS)"
        required: true
        default: "TOPFACE"
        type: string

      season_coeff:
        description: "Коэффициент сезонности"
        required: true
        default: "1.0"
        type: string

      strategy_mode:
        description: "Режим расчёта: default или economy"
        required: true
        default: "default"
        type: choice
        options:
          - default
          - economy

      run_date:
        description: "Дата расчёта YYYY-MM-DD"
        required: false
        default: ""
        type: string

      send_email:
        description: "Отправлять письмо"
        required: true
        default: false
        type: boolean

jobs:
  wb-supply:
    runs-on: ubuntu-latest

    env:
      WB_S3_BUCKET: ${{ secrets.WB_S3_BUCKET }}
      WB_S3_ACCESS_KEY: ${{ secrets.WB_S3_ACCESS_KEY }}
      WB_S3_SECRET_KEY: ${{ secrets.WB_S3_SECRET_KEY }}
      WB_S3_ENDPOINT: ${{ secrets.WB_S3_ENDPOINT }}
      WB_S3_REGION: ${{ secrets.WB_S3_REGION }}

      WB_SMTP_HOST: ${{ secrets.WB_SMTP_HOST }}
      WB_SMTP_PORT: ${{ secrets.WB_SMTP_PORT }}
      WB_SMTP_USER: ${{ secrets.WB_SMTP_USER }}
      WB_SMTP_PASSWORD: ${{ secrets.WB_SMTP_PASSWORD }}
      WB_SMTP_SENDER: ${{ secrets.WB_SMTP_SENDER }}
      WB_SMTP_TO: ${{ secrets.WB_SMTP_TO }}
      WB_SMTP_CC: ${{ secrets.WB_SMTP_CC }}

      WB_TEMPLATE_KEY: ${{ secrets.WB_TEMPLATE_KEY }}

      WB_UPLOAD_RESULT_TO_S3: "1"
      WB_OUTPUT_DIR: "output"

      WB_STORE: ${{ inputs.store_name }}
      WB_SEASON_COEFF: ${{ inputs.season_coeff }}
      WB_STRATEGY_MODE: ${{ inputs.strategy_mode }}
      WB_SEND_EMAIL: ${{ inputs.send_email }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set run date
        shell: bash
        run: |
          if [ -n "${{ inputs.run_date }}" ]; then
            echo "WB_RUN_DATE=${{ inputs.run_date }}" >> $GITHUB_ENV
          else
            echo "WB_RUN_DATE=$(date +%F)" >> $GITHUB_ENV
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run WB supply calculation
        run: |
          python wb_supply_calculator.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wb-supply-${{ inputs.store_name }}
          path: output/*
          if-no-files-found: error
