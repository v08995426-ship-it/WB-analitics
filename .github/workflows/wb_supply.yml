name: WB Supply Calculation

on:
  workflow_dispatch:
    inputs:
      store_name:
        description: "Магазин: TOPFACE или MISS_TAIS"
        required: true
        default: "TOPFACE"
        type: string

      season_coeff:
        description: "Коэффициент сезонности"
        required: true
        default: "1.0"
        type: string

      strategy_mode:
        description: "Режим расчёта"
        required: true
        default: "default"
        type: choice
        options:
          - default
          - economy

      run_date:
        description: "Дата расчёта YYYY-MM-DD. Если пусто — берётся сегодняшняя дата"
        required: false
        default: ""
        type: string

jobs:
  wb-supply:
    runs-on: ubuntu-latest

    env:
      WB_S3_BUCKET: ${{ secrets.WB_S3_BUCKET }}
      WB_S3_ACCESS_KEY: ${{ secrets.WB_S3_ACCESS_KEY }}
      WB_S3_SECRET_KEY: ${{ secrets.WB_S3_SECRET_KEY }}
      WB_S3_ENDPOINT: ${{ secrets.WB_S3_ENDPOINT }}
      WB_S3_REGION: ${{ secrets.WB_S3_REGION }}

      WB_TEMPLATE_KEY: ${{ secrets.WB_TEMPLATE_KEY }}

      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      WB_UPLOAD_RESULT_TO_S3: "1"
      WB_OUTPUT_DIR: "output"
      WB_SEND_TELEGRAM: "1"

      WB_STORE: ${{ github.event.inputs.store_name }}
      WB_SEASON_COEFF: ${{ github.event.inputs.season_coeff }}
      WB_STRATEGY_MODE: ${{ github.event.inputs.strategy_mode }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set run date
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.run_date }}" ]; then
            echo "WB_RUN_DATE=${{ github.event.inputs.run_date }}" >> $GITHUB_ENV
          else
            echo "WB_RUN_DATE=$(date +%F)" >> $GITHUB_ENV
          fi

      - name: Show input params
        shell: bash
        run: |
          echo "WB_STORE=$WB_STORE"
          echo "WB_SEASON_COEFF=$WB_SEASON_COEFF"
          echo "WB_STRATEGY_MODE=$WB_STRATEGY_MODE"
          echo "WB_RUN_DATE=$WB_RUN_DATE"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run WB supply calculation
        shell: bash
        run: |
          python wb_supply_calculator.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wb-supply-${{ github.event.inputs.store_name }}
          path: output/*
          if-no-files-found: error
