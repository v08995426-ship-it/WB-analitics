name: WB Supply Calculator Supplier

on:
  workflow_dispatch:
    inputs:
      run_date:
        description: 'Дата расчёта YYYY-MM-DD. Если пусто — берётся текущая дата.'
        required: false
        default: ''
      supplier_default_coeff:
        description: 'Коэффициент по умолчанию для SKU вне плана'
        required: false
        default: '1.0'
      supplier_lead_days:
        description: 'Срок поставки от производителя, дней'
        required: false
        default: '80'
      supplier_coverage_days:
        description: 'Покрытие после приезда, дней'
        required: false
        default: '60'
      supplier_breakthrough_threshold:
        description: 'Порог статуса Прорыв'
        required: false
        default: '1.5'
      abc_target_month:
        description: 'Месяц ABC в формате YYYY-MM'
        required: false
        default: '2026-03'
  schedule:
    - cron: '0 3 * * *'

jobs:
  run-supplier-calculation:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy openpyxl boto3 botocore requests

      - name: Prepare run date
        id: prep
        shell: bash
        run: |
          INPUT_RUN_DATE="${{ github.event.inputs.run_date }}"
          if [ -n "$INPUT_RUN_DATE" ]; then
            echo "run_date=$INPUT_RUN_DATE" >> "$GITHUB_OUTPUT"
          else
            echo "run_date=$(date +%F)" >> "$GITHUB_OUTPUT"
          fi

      - name: Run supplier calculation
        env:
          WB_S3_BUCKET: ${{ secrets.WB_S3_BUCKET }}
          WB_S3_ACCESS_KEY: ${{ secrets.WB_S3_ACCESS_KEY }}
          WB_S3_SECRET_KEY: ${{ secrets.WB_S3_SECRET_KEY }}
          WB_S3_ENDPOINT: ${{ secrets.WB_S3_ENDPOINT }}
          WB_S3_REGION: ${{ secrets.WB_S3_REGION }}
          WB_STORE: TOPFACE
          WB_SEND_TELEGRAM: 'true'
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        shell: bash
        run: |
          python "wb_supply_calculator (1).py" \
            --mode supplier \
            --run-date "${{ steps.prep.outputs.run_date }}" \
            --supplier-default-coeff "${{ github.event.inputs.supplier_default_coeff || '1.0' }}" \
            --supplier-lead-days "${{ github.event.inputs.supplier_lead_days || '80' }}" \
            --supplier-coverage-days "${{ github.event.inputs.supplier_coverage_days || '60' }}" \
            --supplier-breakthrough-threshold "${{ github.event.inputs.supplier_breakthrough_threshold || '1.5' }}" \
            --abc-target-month "${{ github.event.inputs.abc_target_month || '2026-03' }}"

      - name: Upload output artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wb-supply-calculator-supplier-output
          path: |
            output/*.xlsx
            output/*.xlsm
            output/*.csv
          if-no-files-found: warn
