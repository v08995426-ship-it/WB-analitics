name: Ozon API docs monitor

on:
  workflow_dispatch:
  schedule:
    # Every Monday at 07:00 UTC
    - cron: '0 7 * * 1'

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python ozon_docs_monitor.py --methods-file tracked_methods.json --state-dir .ozon-docs-monitor --fail-on-error

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ozon-api-monitor-report
          path: .ozon-docs-monitor/

      - name: Commit updated state
        if: always()
        run: |
          if git diff --quiet -- .ozon-docs-monitor; then
            echo "No state changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .ozon-docs-monitor
          git commit -m "Update Ozon docs monitor state"
          git push
