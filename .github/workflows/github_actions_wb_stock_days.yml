name: WB stock days report

on:
  schedule:
    # Понедельник и пятница в 09:00 по Москве = 06:00 UTC
    - cron: '0 6 * * 1,5'
  workflow_dispatch:
    inputs:
      run_date:
        description: 'Дата запуска в формате YYYY-MM-DD. Пусто = сегодня.'
        required: false
        default: ''
      force_send:
        description: 'Принудительно отправить отчёт в Telegram'
        required: false
        default: 'true'

jobs:
  build-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install boto3 pandas openpyxl requests numpy

      - name: Run WB stock days report
        env:
          WB_S3_BUCKET: ${{ secrets.WB_S3_BUCKET }}
          WB_S3_ACCESS_KEY: ${{ secrets.WB_S3_ACCESS_KEY }}
          WB_S3_SECRET_KEY: ${{ secrets.WB_S3_SECRET_KEY }}
          WB_S3_ENDPOINT: ${{ secrets.WB_S3_ENDPOINT }}
          WB_S3_REGION: ${{ secrets.WB_S3_REGION }}
          WB_STORE: TOPFACE
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WB_SEND_TELEGRAM: 'true'
          WB_UPLOAD_RESULT_TO_S3: 'false'
        run: |
          CMD="python wb_stock_days_report.py run"
          if [ -n "${{ github.event.inputs.run_date }}" ]; then
            CMD="$CMD --run-date ${{ github.event.inputs.run_date }}"
          fi
          if [ "${{ github.event.inputs.force_send }}" = "true" ]; then
            CMD="$CMD --force-send"
          fi
          echo "$CMD"
          eval "$CMD"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wb-stock-days-report
          path: output/*.xlsx
          if-no-files-found: warn
