name: WB Stock Days Report

on:
  schedule:
    - cron: "0 10 * * 1,5"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas boto3 openpyxl requests

      - name: Run WB stock report
        env:
          YC_ACCESS_KEY_ID: ${{ secrets.YC_ACCESS_KEY_ID }}
          YC_SECRET_ACCESS_KEY: ${{ secrets.YC_SECRET_ACCESS_KEY }}
          YC_BUCKET_NAME: ${{ secrets.YC_BUCKET_NAME }}

          CLOUD_RU_ACCESS_KEY: ${{ secrets.CLOUD_RU_ACCESS_KEY }}
          CLOUD_RU_SECRET_KEY: ${{ secrets.CLOUD_RU_SECRET_KEY }}
          CLOUD_RU_BUCKET: ${{ secrets.CLOUD_RU_BUCKET }}

          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WB_STOP_LIST_KEY: ${{ secrets.WB_STOP_LIST_KEY }}

          WB_FORCE_SEND: ${{ github.event_name == 'workflow_dispatch' }}
        run: python wb_stock_days_report.py

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: wb-stock-days-report
          path: output/*.xlsx
          if-no-files-found: error
