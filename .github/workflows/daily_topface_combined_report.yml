name: Daily TOPFACE Combined Report

on:
  workflow_dispatch:
  schedule:
    - cron: "10 6 * * *"

jobs:
  build-combined-report:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      USE_S3: "1"
      YC_BUCKET_NAME: ${{ secrets.YC_BUCKET_NAME }}
      YC_ACCESS_KEY_ID: ${{ secrets.YC_ACCESS_KEY_ID }}
      YC_SECRET_ACCESS_KEY: ${{ secrets.YC_SECRET_ACCESS_KEY }}
      PYTHONIOENCODING: "utf-8"
      LANG: "C.UTF-8"
      LC_ALL: "C.UTF-8"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show repository files
        run: |
          pwd
          ls -la
          ls -la .github/workflows || true

      - name: Verify main script exists
        run: |
          python - <<'PY'
from pathlib import Path
p = Path("wb_combined_report_final.py")
print("exists:", p.exists())
print("size:", p.stat().st_size if p.exists() else "missing")
if not p.exists():
    raise SystemExit("wb_combined_report_final.py not found in repository root")
PY

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl boto3 python-dateutil numpy

      - name: Run combined report
        run: |
          python wb_combined_report_final.py

      - name: Upload generated reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: topface-combined-report
          path: |
            Отчёты/Объединенный отчет/TOPFACE/**/*.xlsx
            Отчёты/Объединенный отчет/TOPFACE/**/*.log
          if-no-files-found: warn
