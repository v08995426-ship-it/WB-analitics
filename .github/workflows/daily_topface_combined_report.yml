name: Daily TOPFACE Combined Report

on:
  workflow_dispatch:
  schedule:
    - cron: "10 6 * * *"

jobs:
  build-combined-report:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      YC_BUCKET_NAME: ${{ secrets.YC_BUCKET_NAME }}
      YC_ACCESS_KEY_ID: ${{ secrets.YC_ACCESS_KEY_ID }}
      YC_SECRET_ACCESS_KEY: ${{ secrets.YC_SECRET_ACCESS_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl boto3 numpy

      - name: Verify files
        run: |
          pwd
          ls -la
          test -f wb_combined_report_final.py

      - name: Run combined report
        run: |
          python wb_combined_report_final.py --root .

      - name: Upload generated reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: topface-combined-report
          path: |
            Отчёты/Объединенный отчет/TOPFACE/**/*.xlsx
          if-no-files-found: warn
