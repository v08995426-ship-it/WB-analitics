name: assistant_wb_ads_manager

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Режим запуска"
        required: true
        default: "preview"
        type: choice
        options:
          - preview
          - run
      confirm_live:
        description: "Подтверждение боевого запуска (true/false)"
        required: false
        default: "false"
        type: string
  schedule:
    - cron: "15 6 * * *"

jobs:
  run-assistant:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install boto3 pandas openpyxl requests python-dateutil

      - name: Verify actual script
        run: |
          echo "=== script marker ==="
          grep -n 'BUILD_MARKER = "WB_MANAGER_2026_04_03_FIX1"' assistant_wb_ads_manager.py
          echo "=== first 5 lines ==="
          sed -n '1,5p' assistant_wb_ads_manager.py

      - name: Run preview on schedule
        if: github.event_name == 'schedule'
        env:
          YC_ACCESS_KEY_ID: ${{ secrets.YC_ACCESS_KEY_ID }}
          YC_SECRET_ACCESS_KEY: ${{ secrets.YC_SECRET_ACCESS_KEY }}
          YC_BUCKET_NAME: ${{ secrets.YC_BUCKET_NAME }}
          WB_PROMO_KEY_TOPFACE: ${{ secrets.WB_PROMO_KEY_TOPFACE }}
        run: python assistant_wb_ads_manager.py preview

      - name: Run manually
        if: github.event_name == 'workflow_dispatch'
        env:
          YC_ACCESS_KEY_ID: ${{ secrets.YC_ACCESS_KEY_ID }}
          YC_SECRET_ACCESS_KEY: ${{ secrets.YC_SECRET_ACCESS_KEY }}
          YC_BUCKET_NAME: ${{ secrets.YC_BUCKET_NAME }}
          WB_PROMO_KEY_TOPFACE: ${{ secrets.WB_PROMO_KEY_TOPFACE }}
        run: |
          if [ "${{ github.event.inputs.mode }}" = "run" ] && [ "${{ github.event.inputs.confirm_live }}" != "true" ]; then
            echo "Для run нужно confirm_live=true"
            exit 1
          fi
          python assistant_wb_ads_manager.py "${{ github.event.inputs.mode }}"
