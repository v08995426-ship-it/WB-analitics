name: Daily TOPFACE Ads Manager

on:
  workflow_dispatch:
  schedule:
    - cron: '15 6 * * *'

jobs:
  run-topface-ads-manager:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      YC_ACCESS_KEY_ID: ${{ secrets.YC_ACCESS_KEY_ID }}
      YC_SECRET_ACCESS_KEY: ${{ secrets.YC_SECRET_ACCESS_KEY }}
      YC_BUCKET_NAME: ${{ secrets.YC_BUCKET_NAME }}
      WB_PROMO_KEY_TOPFACE: ${{ secrets.WB_PROMO_KEY_TOPFACE }}
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl xlsxwriter requests boto3 python-dateutil numpy

      - name: Verify required secrets
        run: |
          python - <<'PY'
          import os, sys
          required = [
              "YC_ACCESS_KEY_ID",
              "YC_SECRET_ACCESS_KEY",
              "YC_BUCKET_NAME",
              "WB_PROMO_KEY_TOPFACE",
          ]
          missing = [k for k in required if not os.getenv(k)]
          if missing:
              print("Missing required secrets:", ", ".join(missing))
              sys.exit(1)
          print("All required secrets are present.")
          PY

      - name: Run TOPFACE Ads Manager (LIVE)
        run: |
          python assistant_wb_ads_manager.py run

      - name: Upload result artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: topface-ads-manager-results
          path: |
            *.xlsx
            *.json
          if-no-files-found: warn
          retention-days: 14
