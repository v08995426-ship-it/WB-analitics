name: Ежедневное обновление данных WB

on:
  schedule:
    - cron: '0 5 * * *'   # 8:00 MSK
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Клонируем репозиторий
        uses: actions/checkout@v4

      - name: Устанавливаем Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Устанавливаем зависимости
        run: pip install pandas openpyxl requests boto3 pytz

      - name: Запускаем скрипт
        env:
          YC_ACCESS_KEY_ID: ${{ secrets.YC_ACCESS_KEY_ID }}
          YC_SECRET_ACCESS_KEY: ${{ secrets.YC_SECRET_ACCESS_KEY }}
          YC_BUCKET_NAME: ${{ secrets.YC_BUCKET_NAME }}
          WB_STATS_KEY_TOPFACE: ${{ secrets.WB_STATS_KEY_TOPFACE }}
          WB_PROMO_KEY_TOPFACE: ${{ secrets.WB_PROMO_KEY_TOPFACE }}
        run: python wb_updater.py
