name: Daily WB Data Update

on:
  schedule:
    # Каждый день в 00:00 UTC (03:00 по Москве)
    - cron: '0 0 * * *'
  workflow_dispatch:  # разрешаем ручной запуск

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests boto3 openpyxl pytz

      - name: Run Wildberries updater
        run: python wb_updater.py
        env:
          # Yandex Cloud Object Storage
          YC_ACCESS_KEY_ID: ${{ secrets.YC_ACCESS_KEY_ID }}
          YC_SECRET_ACCESS_KEY: ${{ secrets.YC_SECRET_ACCESS_KEY }}
          YC_BUCKET_NAME: ${{ secrets.YC_BUCKET_NAME }}

          # Wildberries API: один универсальный ключ для всех методов
          WB_PROMO_KEY_TOPFACE: ${{ secrets.WB_PROMO_KEY_TOPFACE }}

          # Ссылка на Google Sheets (лист "Остатки из 1С")
          URL_1C_STOCKS: ${{ secrets.URL_1C_STOCKS }}

          # Если для доступа к 1С требуется базовая HTTP-аутентификация, добавьте:
          # _1C_USER: ${{ secrets._1C_USER }}
          # _1C_PASSWORD: ${{ secrets._1C_PASSWORD }}
