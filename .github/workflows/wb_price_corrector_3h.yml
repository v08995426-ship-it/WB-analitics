name: WB Price Corrector 3H

on:
  schedule:
    # Москва = UTC+3. Запуски по МСК: 03:00, 05:00, 08:00, 11:00, 14:00, 17:00, 20:00, 23:00.
    - cron: '0 0,2,5,8,11,14,17,20 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Только расчёт без отправки цен в WB'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      max_price_change_pct:
        description: 'Максимальное изменение price за запуск, 0 = отключить'
        required: false
        default: '80'
      target_factor:
        description: 'Опционально: вручную задать коэффициент РРЦ. Пусто = авто 0.8 ночью / 0.9 днем'
        required: false
        default: ''

jobs:
  correct-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests boto3 openpyxl pytz

      - name: Run WB price corrector
        env:
          YC_ACCESS_KEY_ID: ${{ secrets.YC_ACCESS_KEY_ID }}
          YC_SECRET_ACCESS_KEY: ${{ secrets.YC_SECRET_ACCESS_KEY }}
          YC_BUCKET_NAME: ${{ secrets.YC_BUCKET_NAME }}
          WB_PROMO_KEY_TOPFACE: ${{ secrets.WB_PROMO_KEY_TOPFACE }}
        run: |
          MAX_CHANGE="${{ github.event.inputs.max_price_change_pct }}"
          if [ -z "$MAX_CHANGE" ]; then
            MAX_CHANGE="80"
          fi

          TARGET_FACTOR="${{ github.event.inputs.target_factor }}"
          EXTRA_ARGS=""
          if [ -n "$TARGET_FACTOR" ]; then
            EXTRA_ARGS="--target-factor $TARGET_FACTOR"
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "Manual dry-run: prices will not be sent"
            python wb_price_corrector.py run --store TOPFACE --dry-run --seller-discount 26 --max-price-change-pct "$MAX_CHANGE" $EXTRA_ARGS
          else
            echo "Scheduled/apply run: prices will be sent to WB"
            python wb_price_corrector.py run --store TOPFACE --apply --seller-discount 26 --max-price-change-pct "$MAX_CHANGE" $EXTRA_ARGS
          fi
